<div id="update-toast" style="
  display: none; 
  position: fixed; 
  bottom: 20px; 
  right: 20px; 
  background-color: #1e293b; 
  color: #ffffff; 
  padding: 16px 20px; 
  border-radius: 12px; 
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
  z-index: 99999; 
  max-width: 300px; /* 案内文が少し長くなるため、幅を少し広げました */
  font-family: sans-serif;
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid #334155;
  animation: slideInToast 0.3s ease-out;
">
  <div style="font-weight: bold; margin-bottom: 6px; color: #fbbf24; display: flex; align-items: center; gap: 6px;">
    📢 システムアップデートのお知らせ
  </div>
  <div id="update-toast-msg" style="color: #cbd5e1; margin-bottom: 12px;">
    </div>
  <div style="text-align: right;">
    <button onclick="document.getElementById('update-toast').style.display='none';" style="
      background-color: #475569; 
      color: #ffffff; 
      border: none; 
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    ">
      閉じる
    </button>
  </div>
</div>

<style>
@keyframes slideInToast {
  from { transform: translateY(100px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

<script>
  window.addEventListener('load', function() {
    // アップデートの確認を行うコア関数
    function checkSystemUpdate() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.hasUpdate) {
            const toast = document.getElementById('update-toast');
            const msg = document.getElementById('update-toast-msg');
            
            // トーストにメッセージを注入して表示
            msg.innerText = `新しいバージョン (${result.latestVersion}) が利用可能です。\n\n管理者は、スプレッドシートの「アプリメニュー」から更新を実行するか、マニュアルに従って最新のGASコードを取得してデプロイをバージョンアップしてください。`;
            
            toast.style.display = 'block';
          }
        })
        .withFailureHandler(function(error) {
          console.error("アップデート確認エラー:", error);
        })
        .checkUpdateForHtml();
    }

    // 1. 初回起動時：起動から「1.5秒後（1500ミリ秒）」に最初のチェックを走らせる
    setTimeout(checkSystemUpdate, 1500); 

    // 2. 定期実行：その後は「24時間（86,400,000ミリ秒）」ごとに自動チェック
    setInterval(checkSystemUpdate, 86400000); 
  });
</script>
