<script>
  document.addEventListener('DOMContentLoaded', () => {
    setDefaultDates(); // 1. デフォルト日付をセット
    fetchData();       // 2. データ取得
    document.getElementById('search-btn').addEventListener('click', fetchData);
  });

  // 当月初(1日)〜今日をセットする
  function setDefaultDates() {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1; // 1-12月

    const formattedMonth = String(currentMonth).padStart(2, '0'); // 月を2桁（01, 02...）に整形
    const startDate = `${currentYear}-${formattedMonth}-01`; // 当月の月初（01日）を作成
    const endDate = now.toISOString().split('T')[0]; // 今日を yyyy-mm-dd形式で取得

    document.querySelectorAll('.date-input')[0].value = startDate;
    document.querySelectorAll('.date-input')[1].value = endDate;
  }

  // サーバーからデータを取得（期間を指定・直呼び出しに修正）
  function fetchData() {
    const listContainer = document.getElementById('user-list');
    const start = document.querySelectorAll('.date-input')[0].value;
    const end = document.querySelectorAll('.date-input')[1].value;

    listContainer.innerHTML = '<p class="text-center py-10 text-slate-400">期間内のデータを集計中...</p>';

    // GAS側の引数の定義に沿って、start と end を直接渡す
    google.script.run
      .withSuccessHandler(renderSummary)
      .withFailureHandler(err => {
        listContainer.innerHTML = `<p class="text-red-500">エラー: ${err.message}</p>`;
      })
      .getSummaryData(start, end);
  }

  // 取得したデータを画面に描画
  function renderSummary(data) {
    const listContainer = document.getElementById('user-list');

    // 在室者⇒不在者の並びにソート
    data.users.sort((a, b) => b.isCurrentlyIn - a.isCurrentlyIn);

    // 統計カードの更新
    document.getElementById('stat-avg-rate').textContent = `${data.stats.averageRate}%`;
    
    const currentInEl = document.getElementById('stat-current-in');
    if (currentInEl) {
      currentInEl.innerHTML = `
        ${data.stats.currentlyIn} <span style="font-size: 1.125rem; color: #64748b; font-weight: 500;">/ ${data.stats.totalActiveUsers} 名</span>
      `;
    }

    // データがない場合のガード
    if (!data.users || data.users.length === 0) {
      listContainer.innerHTML = '<p class="text-center py-10 text-slate-400">期間内のデータがありません。</p>';
      return;
    }

    // リストの描画
    listContainer.innerHTML = data.users.map(user => {
      // 在室・不在のバッジを定義
      const statusBadge = user.isCurrentlyIn 
        ? `<span class="status-badge badge-in">在室</span>` 
        : `<span class="status-badge badge-out">不在</span>`;

      // HTMLを返す（テンプレートリテラル）
      return `
        <details class="group bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm transition-all duration-300 open:ring-2 open:ring-blue-500/20">
          <summary class="flex items-center justify-between p-5 cursor-pointer hover:bg-slate-50 transition-colors gap-4">
            <div class="min-w-0 flex items-center gap-3"> 
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <h3 class="font-bold text-slate-800 text-lg truncate">${user.name}</h3>
                  ${statusBadge}
                </div>
                <p class="text-sm text-slate-400 truncate">${user.email}</p>
              </div>
            </div>
            
            <div class="flex items-center gap-8 flex-shrink-0">
              <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">出席率</p>
                <p class="text-xl font-black ${user.rate < 80 ? 'text-orange-500' : 'text-emerald-500'}">
                  ${user.rate}<span class="text-sm ml-0.5">%</span>
                </p>
              </div>
              <div class="group-open-rotate transition-transform duration-300 text-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
              </div>
            </div>
          </summary>
          <div class="px-5 pb-5 overflow-x-auto">
            <div class="bg-slate-50 rounded-xl p-4 border border-slate-100">
              <table class="w-full text-left text-sm">
                <thead>
                  <tr class="text-slate-400 font-medium border-b border-slate-200">
                    <th class="py-3 px-2">日付</th>
                    <th class="py-3">入室</th>
                    <th class="py-3">退室</th>
                    <th class="py-3 text-right">在室</th>
                  </tr>
                </thead>
                <tbody class="text-slate-600 divide-y divide-slate-200">
                  ${user.logs.map(log => `
                    <tr class="hover:bg-slate-100 transition-colors">
                      <td class="py-3 px-2 font-medium text-slate-700">${log.date}</td>
                      <td class="py-3">${log.in}</td>
                      <td class="py-3">${log.out || '--:--'}</td>
                      <td class="py-3 text-right font-mono font-medium">${log.duration || '---'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </details>
      `;
    }).join('');
  }
</script>
