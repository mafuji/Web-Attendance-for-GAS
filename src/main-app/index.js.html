<script>
  Vue.createApp({
    data() {
      return {
        isReady: false,
        isIn: false,
        isAdmin: false,
        isMenuOpen: false, 
        email: "", // 💡 残す
        name: "",  // 💡 追加
        sessionId: SERVER_SESSION_ID,
        requirePassword: requirePassword,
        isSessionExpired: false,
        lastAction: { time: "", status: "" }
      }
    },
    async mounted() {
      // 💡 2つの通信を同時にスタートさせる（並列呼び出し）
      this.fetchUserData();
      this.checkAdmin();
    },
    methods: {
      // ユーザー情報の取得
      fetchUserData() {
        google.script.run
          .withFailureHandler(() => { this.checkReady(); })
          .withSuccessHandler(res => {
            this.email = res.email;
            this.name = res.name;
            if (res.lastAction) {
              this.lastAction = {
                time: res.lastAction.timestamp,
                status: res.lastAction.status === "IN" ? "入室" : "退室"
              };
              this.isIn = (res.lastAction.status === "IN");
            }
            this.checkReady(); // 💡 終わったら準備完了チェックへ
          })
          .getStatusOfActiveUser();
      },

      // 管理者判定
      checkAdmin() {
        google.script.run
          .withFailureHandler(() => { this.checkReady(); })
          .withSuccessHandler(res => {
            this.isAdmin = res;
            this.checkReady(); // 💡 終わったら準備完了チェックへ
          })
          .isAdmin();
      },

      // 💡 新設：両方のデータが揃ったら画面を表示する判定関数
      checkReady() {
        // email（UserDataの結果）と isAdmin の結果がどちらも取得できたら表示フラグを立てる
        if ((this.email || this.isReady) && (this.isAdmin !== undefined)) {
          this.isReady = true;
        }
      },

      // パスワード認証とIP送信を挟んだ打刻処理
      async send(status) {
        let password = null;

        Swal.fire({
          title: '処理中...',
          allowOutsideClick: false,
          allowEscapeKey: false,
          showConfirmButton: false,
          didOpen: () => { Swal.showLoading(); }
        });

        // 💡 ⚡ボタンが押された瞬間に、超高速で自身のIPを取得（画面起動時ではなく今やる）
        let userIp = "";
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          userIp = data.ip;
        } catch(e) {
          Swal.fire("エラー", "ネットワーク環境が確認できませんでした。研究室のWi-Fiに接続されているか確認してください。", "error");
          return;
        }

        if (status === "IN" && requirePassword === true) {
          Swal.close(); // パスワード入力のために一度ローディングを閉じる
          const { value: typedPassword } = await Swal.fire({
            title: 'パスワード入力',
            input: 'password',
            inputAttributes: {
              maxlength: '4',
              inputmode: 'numeric',
              pattern: '[0-9]*',
              style: 'text-align: center; font-size: 24px; letter-spacing: 4px;'
            },
            showCancelButton: true,
            cancelButtonText: 'キャンセル',
            confirmButtonText: '次へ',
            inputValidator: (value) => {
              if (!value || value.length !== 4 || isNaN(value)) {
                return '4桁の数字を入力してください';
              }
            }
          });

          if (!typedPassword) return;
          password = typedPassword;

          // 再度ローディングを表示
          Swal.fire({ title: '処理中...', allowOutsideClick: false, showConfirmButton: false, didOpen: () => { Swal.showLoading(); } });
        }

        const runner = google.script.run
          .withFailureHandler(e => {
            Swal.fire("エラー", "通信に失敗しました: " + e, "error");
          })
          .withSuccessHandler(res => {
            if (res === null) {
              this.isSessionExpired = true;
              Swal.close();
              return;
            }
            
            let displayTime = "";

            if (status === "IN" && requirePassword === true) {
              if (res.success === false) {
                // 💡 GAS側から「IPエラー」か「パスワードエラー」のメッセージが返ってくる
                Swal.fire("打刻失敗", res.message, "error");
                return;
              }
              displayTime = res.timestamp;
            } else {
              displayTime = res;
            }

            this.isIn = (status === "IN");
            this.lastAction = {
              time: displayTime,
              status: status === "IN" ? "入室" : "退室"
            };

            Swal.fire({
              title: '完了',
              text: status === "IN" ? "入室を記録しました" : "退室を記録しました",
              icon: 'success',
              timer: 2000,
              showConfirmButton: false
            });
          });

        // 💡 修正：末尾に取得した userIp を引数として追加してGASにまとめてブチ込む（通信は1回のみ）
        if (status === "IN" && requirePassword === true) {
          runner.verifyPasswordAndInsert(status, this.sessionId, password, userIp);
        } else {
          runner.insertRecord(status, this.sessionId, userIp);
        }
      },

      sendIn() { this.send("IN"); },
      sendOut() { this.send("OUT"); },

      openDashboard() {
        this.isMenuOpen = false;
        google.script.run
          .withSuccessHandler(url => {
            window.top.location.href = url + "?p=summary";
          })
          .getAppUrl();
      },

      logout() {
        this.isMenuOpen = false;
        Swal.fire({
          title: 'ログアウトしますか？',
          text: "Googleアカウントのログアウトページへ移動します",
          icon: 'question',
          showCancelButton: true,
          confirmButtonText: 'ログアウト',
          cancelButtonText: 'キャンセル'
        }).then((result) => {
          if (result.isConfirmed) {
            google.script.run
              .withSuccessHandler(function(url) {
                var logoutUrl = 'https://accounts.google.com/Logout?continue=' + 
                                encodeURIComponent('https://accounts.google.com/ServiceLogin?continue=' + url);
                window.top.location.href = logoutUrl;
              })
              .getAppUrl();
          }
        });
      }
    }
  }).mount("#main");
</script>
