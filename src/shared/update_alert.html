<div id="update-toast" style="
  display: none; 
  position: fixed; 
  bottom: 20px; 
  right: 20px; 
  background-color: #1e293b; 
  color: #ffffff; 
  padding: 16px 20px; 
  border-radius: 12px; 
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
  z-index: 99999; 
  max-width: 280px;
  font-family: sans-serif;
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid #334155;
  animation: slideInToast 0.3s ease-out;
">
  <div style="font-weight: bold; margin-bottom: 6px; color: #fbbf24; display: flex; align-items: center; gap: 6px;">
    ✨ アップデートがあります
  </div>
  <div id="update-toast-msg" style="color: #cbd5e1; margin-bottom: 12px;">
    新しいバージョンが利用可能です。
  </div>
  <div style="text-align: right;" id="update-toast-actions">
    <button onclick="handleUpdateClick();" style="
      background-color: #2563eb; 
      color: #ffffff; 
      border: none; 
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    ">
      今すぐ更新
    </button>
  </div>
</div>

<style>
@keyframes slideInToast {
  from { transform: translateY(100px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

<script>
  // 最新のバージョンを保持する変数
  let targetLatestVersion = "";

  window.addEventListener('load', function() {
    setTimeout(function() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.hasUpdate) {
            targetLatestVersion = result.latestVersion; // バージョンを記憶
            const toast = document.getElementById('update-toast');
            const msg = document.getElementById('update-toast-msg');
            msg.innerText = `新しいバージョン (${result.latestVersion}) が公開されました。アプリを正しく動作させるため、更新をお願いします。`;
            toast.style.display = 'block';
          }
        })
        .withFailureHandler(function(error) {
          console.error("アップデート確認エラー:", error);
        })
        .checkUpdateForHtml();
    }, 1500); 
  });

  /**
   * 「今すぐ更新」ボタンが押された時の処理
   */
  function handleUpdateClick() {
    // 1. 実行前の確認
    const confirmUpdate = confirm(`アプリをバージョン ${targetLatestVersion} にアップデートしますか？\n（処理には数十秒かかります。完了するまで画面を閉じないでください）`);
    if (!confirmUpdate) return;

    const msg = document.getElementById('update-toast-msg');
    const actions = document.getElementById('update-toast-actions');

    // ボタンを非表示にして、処理中メッセージに切り替える
    actions.style.display = 'none';
    msg.innerText = "⏳ アップデートを実行中... システムを書き換えています。そのままお待ちください。";

    // 2. GASの実行関数（サーバー側で用意）を呼び出す
    google.script.run
      .withSuccessHandler(function(success) {
        if (success) {
          // 反映時間を考慮し、完了メッセージを出して5秒後に自動リロード
          msg.innerText = "🎉 アップデートが正常に完了しました！最新のプログラムを反映するため、5秒後に自動的にページを再読み込みします。";
          
          setTimeout(function() {
            location.reload();
          }, 5000); // 5000ミリ秒（5秒）待機
        } else {
          msg.innerText = "❌ アップデートに失敗しました。時間をおいて再度お試しください。";
          actions.style.display = 'block'; // ボタンを再表示
        }
      })
      .withFailureHandler(function(error) {
        msg.innerText = "❌ エラーが発生しました: " + error.message;
        actions.style.display = 'block'; // ボタンを再表示
      })
      .executeUpdateFromHtml(targetLatestVersion); // HTML用の実行関数
  }
</script>
