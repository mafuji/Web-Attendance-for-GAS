<script>
  // 最新のパスワードを取得して表示する関数
  async function updatePasscode() {
    document.getElementById("status").innerText = "同期中...";
    
    try {
      google.script.run
        .withSuccessHandler((receivedPasscode) => {
          // 取得した4桁のパスワードを画面に表示
          document.getElementById("passcode").innerText = receivedPasscode;
          
          const now = new Date();
          document.getElementById("status").innerText = "最終更新: " + now.toLocaleTimeString();
        })
        .withFailureHandler((err) => {
          console.error("GASエラー:", err);
          document.getElementById("status").innerText = "同期失敗";
        })
        .getLatestPassword();
    } catch (err) {
      console.error("通信エラー:", err);
      document.getElementById("status").innerText = "接続エラー";
    }
  }

  // 初回実行と5秒ごとの定期実行
  updatePasscode();
  setInterval(updatePasscode, 5000);
</script>
