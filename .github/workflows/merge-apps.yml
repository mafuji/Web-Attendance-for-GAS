name: Merge GAS Source Files

on:
  push:
    branches:
      - '**' # 全てのブランチへのpushをトリガー（本番時は 'main' のみに絞ることも可能）
    tags:
      - 'v*' # 💡「v1.0.0」などのリリース用タグがPushされた時もこのActionsを起動する

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 変更をリポジトリにpushするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run merge script
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function mergeApp(appDir, outputFileName) {
            const srcPath = path.join(process.cwd(), 'src', appDir);
            // 出力先を「prd/アプリ名」のフォルダに設定
            const prdPath = path.join(process.cwd(), 'prd', appDir);

            if (!fs.existsSync(srcPath)) return;

            // prd/アプリ名 フォルダがなければ事前に作成
            if (!fs.existsSync(prdPath)) {
              fs.mkdirSync(prdPath, { recursive: true });
            }

            const files = fs.readdirSync(srcPath);
            let gsContent = '';
            const htmlTemplates = {};

            // 1. 各ファイルを読み込む
            files.forEach(file => {
              const filePath = path.join(srcPath, file);
              
              // appsscript.json の場合は prd 側のフォルダにそのままコピーして同期
              if (file === 'appsscript.json') {
                const destConfigPath = path.join(prdPath, 'appsscript.json');
                fs.copyFileSync(filePath, destConfigPath);
                console.log(`Copied appsscript.json to ${prdPath}`);
                return;
              }

              if (fs.statSync(filePath).isDirectory()) return;

              const content = fs.readFileSync(filePath, 'utf8');
              if (file.endsWith('.js')) {
                gsContent += `\n// --- File: ${file} ---\n` + content + '\n';
              } else if (file.endsWith('.html')) {
                // 拡張子を除いたファイル名をキーにする
                const key = path.basename(file, '.html');
                htmlTemplates[key] = content;
              }
            });

            // 2. getHtmlTemplate 内の const templates = {} を置換する
            // テンプレートをJSON文字列化して、エスケープや改行を安全に処理
            const jsonTemplates = JSON.stringify(htmlTemplates, null, 2);
            const targetPattern = 'const templates = {}';
            
            if (gsContent.includes(targetPattern)) {
              gsContent = gsContent.replace(targetPattern, `const templates = ${jsonTemplates}`);
            } else {
              console.log(`[Warning] '${targetPattern}' not found in ${appDir}`);
            }

            // 3. 指定された prd 内のフォルダに書き出し
            const outputPath = path.join(prdPath, outputFileName);
            fs.writeFileSync(outputPath, gsContent.trim(), 'utf8');
            console.log(`Successfully created ${outputPath}`);

            // ====================================================
            // 💡 【新規追加】タグPushの時だけ version.json を本物のタグ名で更新
            // ====================================================
            const versionJsonPath = path.join(prdPath, 'version.json');
            const githubRefType = process.env.GITHUB_REF_TYPE; // "tag" または "branch"
            const githubRefName = process.env.GITHUB_REF_NAME; // "v1.0.0" や "main" など

            if (githubRefType === 'tag') {
              // 正式リリース（タグが打たれた）の時だけ、version.json をその値に書き換え
              fs.writeFileSync(versionJsonPath, JSON.stringify({ version: githubRefName }), 'utf8');
              console.log(`[Release] Updated version.json to ${githubRefName} in ${appDir}`);
            } else {
              // 普段の開発Pushの時は、ファイルがなければ作成（既存の最新バージョン表記は破壊しない）
              if (!fs.existsSync(versionJsonPath)) {
                fs.writeFileSync(versionJsonPath, JSON.stringify({ version: "v0.0.0" }), 'utf8');
                console.log(`[Init] Created default version.json in ${appDir}`);
              } else {
                console.log(`[Develop] Skipped version.json update to preserve the latest release tag.`);
              }
            }

            // ====================================================
            // 💡 共通の updater.js をアプリごとにカスタマイズして配置
            // ====================================================
            const sharedUpdaterPath = path.join(process.cwd(), 'src', 'shared', 'updater.js');
            if (fs.existsSync(sharedUpdaterPath)) {
              let updaterContent = fs.readFileSync(sharedUpdaterPath, 'utf8');
              
              // TARGET_APP_DIR の部分を、現在の appDir ("main-app" や "controller-app") に置換
              updaterContent = updaterContent.replace(
                /const TARGET_APP_DIR = ".*?";/,
                `const TARGET_APP_DIR = "${appDir}";`
              );
              
              const destUpdaterPath = path.join(prdPath, 'updater.js');
              fs.writeFileSync(destUpdaterPath, updaterContent, 'utf8');
              console.log(`Successfully generated and copied updater.js to ${destUpdaterPath}`);
            } else {
              console.log(`[Warning] Shared updater.js not found at ${sharedUpdaterPath}`);
            }
          }

          // 2つのアプリを実行（出力先ディレクトリは関数内で自動処理）
          mergeApp('main-app', 'merged.js');
          mergeApp('controller-app', 'merged.js');
          EOF

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # prdフォルダ全体の変更をステージングに対象変更
          git add prd/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generated merged GS, updater, and config files [skip ci]"
            # 現在のブランチまたはタグに対して自動でPushされます
            git push origin ${GITHUB_REF_NAME}
          else
            echo "No changes to commit"
          fi
